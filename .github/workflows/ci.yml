name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions: {}

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Type checking
        run: uv run python -m pyright -p pyproject.toml src/ tests/

      - name: Run tests
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export QT_QPA_PLATFORM=offscreen
          fi
          uv run pytest --no-qt-log
