name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.40.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0 patchelf ccache
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Build with Nuitka
        run: just build-release

      - name: Package tar.gz
        run: tar -czf PxModRim-Linux.tar.gz -C dist entrypoint.dist/

      - name: Copy AppImage
        run: cp dist/PxModRim-x86_64.AppImage .

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v7
        with:
          name: PxModRim-Linux
          path: PxModRim-Linux.tar.gz

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v7
        with:
          name: PxModRim-Linux-AppImage
          path: PxModRim-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.40.0

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Build with Nuitka
        run: just build-release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PxModRim-Windows
          path: dist/entrypoint.dist/*

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: PxModRim-Linux
          path: linux-targz

      - uses: actions/download-artifact@v8
        with:
          name: PxModRim-Linux-AppImage
          path: linux-appimage

      - uses: actions/download-artifact@v8
        with:
          name: PxModRim-Windows
          path: windows

      - name: Package Windows release
        run: 7z a PxModRim-Windows.zip ./windows/*

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            linux-targz/PxModRim-Linux.tar.gz
            linux-appimage/PxModRim-x86_64.AppImage
            PxModRim-Windows.zip
          generate_release_notes: true
