name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: PxModRim-Linux
            binary_name: PxModRim
          - os: windows-latest
            artifact_name: PxModRim-Windows
            binary_name: PxModRim.exe

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0 patchelf ccache
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Install Dependencies
        run: uv sync --locked --dev

      - name: Build with Nuitka
        run: uv run python packaging/build.py

      - name: Package distribution
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Linux" ]; then
            tar -czf ../${{ matrix.artifact_name }}.tar.gz entrypoint.dist/
            if [ -f PxModRim-x86_64.AppImage ]; then
              cp PxModRim-x86_64.AppImage ../
            fi
          else
            7z a ../${{ matrix.artifact_name }}.zip entrypoint.dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.*
            PxModRim-x86_64.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
